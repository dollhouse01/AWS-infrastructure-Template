name: Infrastructure Deployment

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'   # Daily at 8 AM
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - deploy-app
          - start-campaign
          - end-campaign
          - archive-data
      campaign_name:
        description: 'Campaign name (for logging)'
        required: false
        type: string
        default: 'general'

env:
  AWS_REGION: af-south-1
  EKS_CLUSTER: prod-digit-hcm

jobs:
  check-season:
    runs-on: ubuntu-latest
    outputs:
      should_be_active: ${{ steps.season-check.outputs.should_be_active }}
      season: ${{ steps.season-check.outputs.season }}
    steps:
      - name: Check Current Month
        id: season-check
        run: |
          CURRENT_MONTH=$(date +%m)
          echo "Current month: $CURRENT_MONTH"
          
          if [ $CURRENT_MONTH -ge 5 ] && [ $CURRENT_MONTH -le 10 ]; then
            echo "🎯 ACTIVE SEASON: May-October"
            echo "should_be_active=true" >> $GITHUB_OUTPUT
            echo "season=ACTIVE" >> $GITHUB_OUTPUT
          else
            echo "❄️ IDLE SEASON: November-April"
            echo "should_be_active=false" >> $GITHUB_OUTPUT
            echo "season=IDLE" >> $GITHUB_OUTPUT
          fi

  deploy-infrastructure:
    needs: check-season
    if: github.event.inputs.action == 'deploy' || github.event.inputs.action == 'start-campaign' || github.event.inputs.action == 'end-campaign' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0
      
      - name: Terraform Init
        run: |
          cd terraform/environments/prod
          terraform init
      
      - name: Terraform Apply
        run: |
          cd terraform/environments/prod
          terraform apply -auto-approve
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER || echo "Cluster not ready yet"
  
  deploy-application:
    if: github.event.inputs.action == 'deploy-app' || github.event.inputs.action == 'start-campaign'
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          kubectl get nodes
      
      - name: Create Namespace
        run: |
          kubectl apply -f kubernetes/digit/namespace.yaml
      
      - name: Deploy ConfigMap and Secrets
        run: |
          kubectl apply -f kubernetes/digit/configmap.yaml
          kubectl apply -f kubernetes/digit/secrets.yaml
          kubectl apply -f kubernetes/digit/service-account.yaml
      
      - name: Deploy PgBouncer
        run: |
          kubectl apply -f kubernetes/digit/pgbouncer.yaml
          kubectl rollout status deployment/pgbouncer -n digit-hcm --timeout=120s
      
      - name: Deploy Backend
        run: |
          kubectl apply -f kubernetes/digit/deployments/backend.yaml
          kubectl rollout status deployment/digit-hcm-backend -n digit-hcm --timeout=180s
      
      - name: Deploy Frontend
        run: |
          kubectl apply -f kubernetes/digit/deployments/frontend.yaml
          kubectl rollout status deployment/digit-hcm-frontend -n digit-hcm --timeout=120s
      
      - name: Deploy Worker
        run: |
          kubectl apply -f kubernetes/digit/deployments/worker.yaml
      
      - name: Deploy Services
        run: |
          kubectl apply -f kubernetes/digit/services/
      
      - name: Deploy HPA
        run: |
          kubectl apply -f kubernetes/digit/hpa.yaml
      
      - name: Deploy Ingress
        run: |
          kubectl apply -f kubernetes/digit/ingress.yaml
      
      - name: Verify Deployment
        run: |
          kubectl get pods -n digit-hcm
          kubectl get svc -n digit-hcm
          echo "✅ Application deployed successfully!"

  start-campaign:
    if: github.event.inputs.action == 'start-campaign'
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Start Campaign
        run: |
          echo "🎯 STARTING CAMPAIGN: ${{ github.event.inputs.campaign_name }}"
          
          # Update Terraform to active
          cd terraform/environments/prod
          sed -i 's/current_period.*=.*/current_period    = "active"/' terraform.tfvars
          terraform init
          terraform apply -auto-approve
          
          # Configure kubectl
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          
          # Scale up
          kubectl scale deployment -n digit-hcm digit-hcm-backend --replicas=5
          kubectl scale deployment -n digit-hcm digit-hcm-frontend --replicas=3
          kubectl scale deployment -n digit-hcm digit-hcm-worker --replicas=2
          
          echo "✅ Campaign started: ${{ github.event.inputs.campaign_name }}"

  end-campaign:
    if: github.event.inputs.action == 'end-campaign'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: End Campaign
        run: |
          echo "🏁 ENDING CAMPAIGN: ${{ github.event.inputs.campaign_name }}"
          
          # Update Terraform to idle
          cd terraform/environments/prod
          sed -i 's/current_period.*=.*/current_period    = "idle"/' terraform.tfvars
          terraform init
          terraform apply -auto-approve
          
          # Configure kubectl
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          
          # Scale down
          kubectl scale deployment -n digit-hcm digit-hcm-backend --replicas=1
          kubectl scale deployment -n digit-hcm digit-hcm-frontend --replicas=1
          kubectl scale deployment -n digit-hcm digit-hcm-worker --replicas=0
          
          echo "✅ Campaign ended: ${{ github.event.inputs.campaign_name }}"

  archive-data:
    if: github.event.inputs.action == 'archive-data'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Archive Old Data
        run: |
          echo "📦 Archiving data older than 1 year"
          
          # Configure kubectl
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER
          
          # Run archive command
          kubectl exec deployment/pgbouncer -n digit-hcm -- psql <<EOF || echo "Database not ready yet"
          CREATE TABLE IF NOT EXISTS attendance_archive (LIKE attendance INCLUDING ALL);
          INSERT INTO attendance_archive SELECT * FROM attendance WHERE date < CURRENT_DATE - INTERVAL '1 year';
          DELETE FROM attendance WHERE date < CURRENT_DATE - INTERVAL '1 year';
          VACUUM ANALYZE attendance;
          EOF
          echo "✅ Archive completed"
