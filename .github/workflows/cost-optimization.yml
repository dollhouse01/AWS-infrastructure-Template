name: Cost Optimization

on:
  schedule:
    - cron: '0 10 * * 1'   # Monday 10 AM
  workflow_dispatch:

jobs:
  reporting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Weekly Cost Report
        run: |
          END_DATE=$(date +%Y-%m-%d)
          START_DATE=$(date -d '7 days ago' +%Y-%m-%d)  # FIXED: removed extra quote
          
          echo "📊 Generating cost report for $START_DATE to $END_DATE"
          
          COST=$(aws ce get-cost-and-usage \
            --time-period Start=$START_DATE,End=$END_DATE \
            --granularity MONTHLY \
            --metrics UnblendedCost \
            --query "ResultsByTime[0].Total.UnblendedCost.Amount" \
            --output text)
          
          echo "Weekly Cost: \$$COST"
          
          # Send to Slack (only if webhook is configured)
          SLACK_WEBHOOK="${{ secrets.SLACK_WEBHOOK_URL }}"
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"📊 Weekly Cost Report: \$$COST\nPeriod: $START_DATE to $END_DATE\"}" \
              $SLACK_WEBHOOK
            echo "✅ Slack notification sent"
          else
            echo "⚠️ Slack webhook not configured - skipping notification"
          fi