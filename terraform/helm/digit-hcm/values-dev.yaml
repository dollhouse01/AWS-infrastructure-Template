environment: dev

replicaCount: 1

backend:
  replicaCount: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 250m
  env:
    - name: APP_ENV
      value: "dev"
    - name: LOG_LEVEL
      value: "debug"

frontend:
  replicaCount: 1
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

worker:
  replicaCount: 0

postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: digit_hcm_dev
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
  readReplicas:
    replicaCount: 0

redis:
  enabled: true
  architecture: standalone
  master:
    persistence:
      size: 5Gi

kafka:
  enabled: true
  replicaCount: 1
  persistence:
    size: 20Gi
  config:
    retention.ms: 86400000  # 1 day

ingress:
  enabled: false