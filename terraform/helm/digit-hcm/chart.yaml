apiVersion: v2
name: digit-hcm
description: A Helm chart for DIGIT HCM application
type: application
version: 1.0.0
appVersion: 1.0.0

dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: kafka
    version: 22.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled

keywords:
  - hcm
  - hr
  - digit

maintainers:
  - name: DevOps Team
    email: devops@digit-hcm.com