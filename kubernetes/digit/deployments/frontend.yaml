apiVersion: apps/v1
kind: Deployment
metadata:
  name: digit-hcm-frontend
  namespace: digit-hcm
  labels:
    app: digit-hcm
    tier: frontend
    environment: ${ENVIRONMENT}
spec:
  replicas: ${FRONTEND_REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: digit-hcm
      tier: frontend
  template:
    metadata:
      labels:
        app: digit-hcm
        tier: frontend
        environment: ${ENVIRONMENT}
    spec:
      serviceAccountName: digit-hcm-sa
      containers:
        - name: frontend
          image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: digit-hcm-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 5
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - digit-hcm
                topologyKey: kubernetes.io/hostname