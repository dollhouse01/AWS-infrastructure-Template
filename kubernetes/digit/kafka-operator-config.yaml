# This requires Strimzi operator to be installed first
# Install with: kubectl create -f https://strimzi.io/install/latest?namespace=digit-hcm

apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: digit-hcm
  labels:
    strimzi.io/cluster: digit-kafka-cluster
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 200Gi
        deleteClaim: false
        class: gp3
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: digit-kafka-cluster
  namespace: digit-hcm
spec:
  kafka:
    version: 3.5.0
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      inter.broker.protocol.version: "3.5"
      auto.create.topics.enable: true
      log.retention.hours: 168  # 7 days for active period
      log.retention.bytes: 1073741824
      log.segment.bytes: 1073741824
    storage:
      type: persistent-claim
      size: 200Gi
      deleteClaim: false
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 100Gi
      deleteClaim: false
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: user-events
  namespace: digit-hcm
  labels:
    strimzi.io/cluster: digit-kafka-cluster
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 604800000  # 7 days
    segment.bytes: 1073741824
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: employee-sync
  namespace: digit-hcm
  labels:
    strimzi.io/cluster: digit-kafka-cluster
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 259200000  # 3 days
    segment.bytes: 536870912
    min.insync.replicas: 2
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: audit-logs
  namespace: digit-hcm
  labels:
    strimzi.io/cluster: digit-kafka-cluster
spec:
  partitions: 3
  replicas: 2
  config:
    retention.ms: 86400000  # 1 day
    segment.bytes: 268435456
    min.insync.replicas: 1