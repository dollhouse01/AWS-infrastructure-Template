apiVersion: v1
kind: Service
metadata:
  name: digit-hcm-backend
  namespace: digit-hcm
  labels:
    app: digit-hcm
    tier: backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: management
  selector:
    app: digit-hcm
    tier: backend