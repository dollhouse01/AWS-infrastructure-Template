apiVersion: v1
kind: ConfigMap
metadata:
  name: digit-hcm-config
  namespace: digit-hcm
data:
  APP_ENV: ${ENVIRONMENT}
  APP_DEBUG: "${DEBUG}"
  APP_TIMEZONE: "UTC"
  LOG_LEVEL: "${LOG_LEVEL}"
  CACHE_DRIVER: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  
  # Database configuration
  DB_CONNECTION: "pgsql"
  DB_HOST: "${DB_HOST}"
  DB_PORT: "${DB_PORT}"
  DB_DATABASE: "${DB_DATABASE}"
  
  # Redis configuration
  REDIS_HOST: "${REDIS_HOST}"
  REDIS_PORT: "${REDIS_PORT}"
  REDIS_CACHE_DB: "1"
  REDIS_SESSION_DB: "2"
  REDIS_QUEUE_DB: "3"
  
  # Kafka configuration
  KAFKA_BROKERS: "${KAFKA_BROKERS}"
  KAFKA_SCHEMA_REGISTRY_URL: "${KAFKA_SCHEMA_REGISTRY_URL}"
  
  # Elasticsearch configuration
  ELASTICSEARCH_HOSTS: "${ELASTICSEARCH_HOSTS}"
  
  # Application URLs
  APP_URL: "${APP_URL}"
  API_URL: "${API_URL}"
  FRONTEND_URL: "${FRONTEND_URL}"