apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: digit-hcm
  labels:
    app: pgbouncer
    component: database-proxy
    environment: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        component: database-proxy
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:1.18.0
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: digit-hcm-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: digit-hcm-secrets
              key: DB_PASSWORD
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: digit-hcm-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: digit-hcm-config
              key: DB_DATABASE
        - name: POOL_MODE
          value: "transaction"
        - name: MAX_CLIENT_CONN
          value: "1000"
        - name: DEFAULT_POOL_SIZE
          value: "50"
        - name: SERVER_RESET_QUERY
          value: "DISCARD ALL"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $DB_USER -d $DB_NAME -h 127.0.0.1"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "pg_isready -U $DB_USER -d $DB_NAME -h 127.0.0.1"
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: digit-hcm
  labels:
    app: pgbouncer
    component: database-proxy
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: digit-hcm
data:
  pgbouncer.ini: |
    [databases]
    * = host=${DB_HOST} port=5432 dbname=${DB_NAME}
    
    [pgbouncer]
    listen_port = 5432
    listen_addr = 0.0.0.0
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    admin_users = postgres
    stats_users = stats
    pool_mode = ${POOL_MODE}
    max_client_conn = ${MAX_CLIENT_CONN}
    default_pool_size = ${DEFAULT_POOL_SIZE}
    reserve_pool_size = 5
    server_reset_query = ${SERVER_RESET_QUERY}
    ignore_startup_parameters = extra_float_digits
    server_check_delay = 30
    query_wait_timeout = 120